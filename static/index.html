<!DOCTYPE html>
<html>
<head>
  <title>AI Chat</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      margin: 0;
    }

    #chat {
      height: 80vh;
      overflow-y: auto;
      padding: 20px;
    }

    .msg {
      margin: 10px 0;
      padding: 10px;
      border-radius: 8px;
      max-width: 70%;
    }

    .user {
      background: #2563eb;
      margin-left: auto;
    }

    .ai {
      background: #1e293b;
    }

    #inputBox {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
    }

    input {
      flex: 1;
      padding: 15px;
      border: none;
    }

    button {
      padding: 15px;
      background: #22c55e;
      border: none;
      color: white;
    }
  </style>
</head>
<body>

<div id="chat"></div>

<div id="inputBox">
  <input id="msg" placeholder="Type..." />
  <button onclick="send()">Send</button>
</div>

<script>
const API = "https://your-backend-domain"; // replace

function add(role, text) {
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.innerText = text;
  document.getElementById("chat").appendChild(div);
}

async function send() {
  const input = document.getElementById("msg");
  const text = input.value;

  add("user", text);
  input.value = "";

  const res = await fetch(API + "/api/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ message: text })
  });

  const data = await res.json();
  add("ai", data.response || "Error");
}
</script>

</body>
</html>
